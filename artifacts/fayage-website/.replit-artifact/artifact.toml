kind = "web"
previewPath = "/fayage-website/"
title = "Fayage Website"
version = "1.0.0"
id = "artifacts/fayage-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/fayage-website/" ]
localPort = 26175

[services.development]
run = "pnpm --filter @workspace/fayage-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fayage-website", "run", "build" ]
publicDir = "artifacts/fayage-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26175"
BASE_PATH = "/fayage-website/"
